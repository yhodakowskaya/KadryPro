<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 100">
  <!-- Rounded square document outline -->
  <rect x="4" y="8" width="66" height="80" rx="13" ry="13"
        fill="none" stroke="#1a6b1a" stroke-width="6.5"/>

  <!-- Diagonal arrow shaft from top-right area going up-right -->
  <line x1="54" y1="24" x2="88" y2="4"
        stroke="#1a6b1a" stroke-width="6" stroke-linecap="round"/>
  <!-- Arrow head (L-shape, pointing up-right) -->
  <polyline points="75,2 92,2 92,18"
        fill="none" stroke="#1a6b1a" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center person (largest) -->
  <circle cx="37" cy="27" r="9.5" fill="#1a6b1a"/>
  <path d="M 18 52 Q 18 40 37 40 Q 56 40 56 52 Z" fill="#1a6b1a"/>

  <!-- Left person (smaller) -->
  <circle cx="17" cy="33" r="6.5" fill="#1a6b1a"/>
  <path d="M 6 52 Q 6 43 17 43 Q 26 43 31 48" fill="#1a6b1a"/>

  <!-- Right person (smaller) -->
  <circle cx="57" cy="33" r="6.5" fill="#1a6b1a"/>
  <path d="M 43 48 Q 48 43 57 43 Q 68 43 68 52" fill="#1a6b1a"/>

  <!-- Orange checkmark -->
  <polyline points="15,74 28,87 60,60"
        fill="none" stroke="#f07030" stroke-width="9"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
